spring.application.name=smartmeal


# CONFIGURAÇÕES DE CONEXÃO - MYSQL
#Faz a conexão e já cria o BD para não precisar criar manualmente no workbench do MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartmeal_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=senha1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# CONFIGURAÇÕES DO HIBERNATE / JPA
# Atualiza as tabelas automaticamente baseado no código, novamente sem precisar criar manualmente
spring.jpa.hibernate.ddl-auto=update

# Mostra no terminal os comandos SQL que o Spring está executando
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Especifica o dialeto do MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Conexão MongoDB (NoSQL)
spring.data.mongodb.uri=mongodb://localhost:27017/smartmeal_nosql

# Configuração da API do Google Gemini
gemini.api.key=${GOOGLE_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
