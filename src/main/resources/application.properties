spring.application.name=smartmeal


# CONFIGURACOES DE CONEXAO - MYSQL
#Faz a conexao e ja cria o BD para nao precisar criar manualmente no workbench do MySQL
# Pega as variaveis da Railway e monta a conexao
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# (Lembre-se de deixar as linhas do MongoDB comentadas com # por enquanto, se ainda nao o vinculou)


# CONFIGURACOES DO HIBERNATE / JPA
# Atualiza as tabelas automaticamente baseado no codigo, novamente sem precisar criar manualmente
spring.jpa.hibernate.ddl-auto=update

# Mostra no terminal os comandos SQL que o Spring esta executando
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Especifica o dialeto do MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Conexao MongoDB (NoSQL)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# Configuracao da API do Google Gemini
gemini.api.key=${GOOGLE_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
